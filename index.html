<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<title>Simulasi Efek Fotoelektrik</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h1>Simulasi Interaktif Efek Fotoelektrik</h1>

<div class="simulation">
<div class="lamp" id="lamp"></div>
<div class="beam" id="beam"></div>
<div class="metal"></div>
<div id="electrons"></div>
</div>

<div class="controls">

<div class="control-box">
<label>Frekuensi Cahaya</label>
<input type="range"
id="frequency"
min="4e14"
max="7.5e14"
step="1e13"
value="4e14">
<p id="freqValue"></p>
</div>

<div class="control-box">
<label>Intensitas</label>
<input type="range"
id="intensity"
min="10"
max="100"
step="10"
value="50">
<p id="intensityValue"></p>
</div>

<div class="control-box">
<label>Logam</label>
<select id="metalSelect">
<option value="2.1">Cesium</option>
<option value="2.3">Sodium</option>
<option value="4.3">Zinc</option>
<option value="4.7">Copper</option>
</select>
</div>

</div>

<div class="buttons">
<button id="startBtn">Mulai</button>
<button id="resetBtn">Reset</button>
</div>

<canvas id="energyChart"></canvas>

<ul id="graphData"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
