<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<title>Simulasi Efek Fotoelektrik</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="container">

<h2>Simulasi Efek Fotoelektrik</h2>

<div class="simulation">
<div id="lamp"></div>
<div id="beam"></div>
<div id="electrons"></div>
</div>

<div class="controls">

<p>Frekuensi Cahaya</p>
<input type="range"
id="frequency"
min="4e14"
max="7.5e14"
step="1e13"
value="4e14">

<p id="freqValue"></p>

<p>Intensitas Cahaya</p>
<input type="range"
id="intensity"
min="10"
max="100"
step="10"
value="50">

<p id="intensityValue"></p>

<p>Jenis Logam</p>
<select id="metalSelect">
<option value="2.1">Cesium (φ = 2.1 eV)</option>
<option value="2.3">Sodium (φ = 2.3 eV)</option>
<option value="4.3">Zinc (φ = 4.3 eV)</option>
<option value="4.7">Copper (φ = 4.7 eV)</option>
</select>

</div>

<div style="margin-top:15px;">
<button id="startBtn">Mulai Simulasi</button>
<button id="resetBtn">Reset</button>
</div>

<canvas id="energyChart"></canvas>

<ul id="graphData"></ul>

</div>

<script src="script.js"></script>

</body>
</html>
